<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediiQuick — My Orders</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --green: #22c55e;
            --green-dark: #16a34a;
            --green-light: #dcfce7;
            --green-mid: #bbf7d0;
            --orange: #f97316;
            --text: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --bg: #f5f7fa;
            --white: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            background: #fff;
            box-shadow: 0 2px 12px rgba(0, 0, 0, .08);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 12px 0;
        }

        .header-inner {
            width: 100%;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo img {
            width: 38px;
            height: 38px;
            border-radius: 10px;
        }

        .logo h1 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1a1a2e;
        }

        .logo span {
            color: #16a34a;
        }

        .header-search {
            flex: 1;
            max-width: 480px;
            display: flex;
            align-items: center;
            background: #f3f4f6;
            border-radius: 50px;
            padding: 8px 18px;
            gap: 10px;
        }

        .header-search input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
        }

        .header-search input::placeholder {
            color: #9ca3af;
        }

        .header-search i {
            color: #9ca3af;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f3f4f6;
            border: none;
            padding: 9px 18px;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 13px;
            color: #374151;
            cursor: pointer;
            text-decoration: none;
        }

        .back-btn:hover {
            background: #e5e7eb;
        }

        main {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 36px 24px 60px;
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .page-sub {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 28px;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid var(--border);
            margin-bottom: 28px;
        }

        .tab {
            padding: 12px 22px;
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2.5px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab.active {
            color: var(--green-dark);
            border-bottom-color: var(--green);
        }

        .tab:hover {
            color: var(--green-dark);
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: white;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 16px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stat-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .si-green {
            background: var(--green-light);
        }

        .si-orange {
            background: #fff7ed;
        }

        .si-purple {
            background: #f5f3ff;
        }

        .si-blue {
            background: #eff6ff;
        }

        .stat-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .stat-val {
            font-size: 1.2rem;
            font-weight: 800;
            margin-top: 2px;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: white;
            border-radius: 16px;
            border: 1.5px solid var(--border);
        }

        .empty-state .ei {
            font-size: 4rem;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .shop-btn {
            display: inline-block;
            background: var(--green-dark);
            color: white;
            padding: 12px 28px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            text-decoration: none;
            transition: background 0.2s;
        }

        .shop-btn:hover {
            background: #15803d;
        }

        .order-card {
            background: white;
            border: 1.5px solid var(--border);
            border-radius: 16px;
            margin-bottom: 20px;
            overflow: hidden;
            transition: box-shadow 0.2s, border-color 0.2s;
            animation: fadeUp 0.4s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .order-card:hover {
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.07);
            border-color: #d1fae5;
        }

        .order-top {
            padding: 14px 20px;
            background: #f8fffe;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .order-meta {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .order-id-tag {
            background: var(--green-light);
            color: var(--green-dark);
            font-size: 0.72rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            letter-spacing: 0.5px;
        }

        .order-date {
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .order-date strong {
            color: var(--text);
            font-weight: 600;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .badge-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }

        .badge-orange {
            background: #fff7ed;
            color: #c2410c;
        }

        .badge-orange .badge-dot {
            background: var(--orange);
            animation: blink 1.5s infinite;
        }

        .badge-green {
            background: var(--green-light);
            color: var(--green-dark);
        }

        .badge-green .badge-dot {
            background: var(--green);
            animation: blink 1.5s infinite;
        }

        .badge-check {
            background: #f0fdf4;
            color: #15803d;
        }

        .badge-check .badge-dot {
            background: #4ade80;
        }

        .badge-red {
            background: #fee2e2;
            color: #dc2626;
        }

        .badge-red .badge-dot {
            background: #dc2626;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .order-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        @media(max-width:700px) {
            .order-body {
                grid-template-columns: 1fr;
            }
        }

        .order-left {
            padding: 18px 20px;
            border-right: 1px solid var(--border);
        }

        .order-right {
            padding: 18px 20px;
        }

        .section-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .med-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 0;
            border-bottom: 1px solid var(--border);
        }

        .med-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .med-item:first-child {
            padding-top: 0;
        }

        .med-img {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .med-off {
            position: absolute;
            top: 0;
            left: 0;
            background: var(--orange);
            color: white;
            font-size: 0.42rem;
            font-weight: 700;
            padding: 1px 3px;
            border-radius: 0 0 4px 0;
        }

        .med-info {
            flex: 1;
            min-width: 0;
        }

        .med-name {
            font-weight: 700;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .med-sub {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .med-price {
            margin-left: auto;
            text-align: right;
            flex-shrink: 0;
        }

        .med-price .curr {
            font-weight: 800;
            font-size: 0.9rem;
            color: var(--green-dark);
        }

        .med-price .orig {
            font-size: 0.68rem;
            color: var(--text-muted);
            text-decoration: line-through;
        }

        .med-price .qty {
            font-size: 0.68rem;
            color: var(--text-muted);
        }

        .tracker-steps {
            display: flex;
            align-items: flex-start;
            margin: 8px 0 18px;
        }

        .t-step {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            gap: 5px;
        }

        .t-step::after {
            content: '';
            position: absolute;
            top: 13px;
            left: calc(50% + 13px);
            width: calc(100% - 26px);
            height: 2px;
            background: var(--border);
            z-index: 0;
        }

        .t-step:last-child::after {
            display: none;
        }

        .t-step.done::after {
            background: var(--green);
        }

        .t-icon {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            position: relative;
            z-index: 1;
            transition: all 0.3s;
        }

        .t-step.done .t-icon {
            background: var(--green);
            border-color: var(--green);
            color: white;
        }

        .t-step.active .t-icon {
            border-color: var(--green);
            background: var(--green-light);
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.15);
            animation: ring 2s infinite;
        }

        @keyframes ring {

            0%,
            100% {
                box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.15);
            }

            50% {
                box-shadow: 0 0 0 8px rgba(34, 197, 94, 0.08);
            }
        }

        .t-label {
            font-size: 0.58rem;
            font-weight: 600;
            text-align: center;
            color: var(--text-muted);
            line-height: 1.3;
            max-width: 52px;
        }

        .t-step.done .t-label,
        .t-step.active .t-label {
            color: var(--green-dark);
        }

        .eta-box {
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1.5px solid;
        }

        .eta-icon {
            font-size: 1.6rem;
            flex-shrink: 0;
        }

        .eta-label {
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .eta-time {
            font-size: 1.1rem;
            font-weight: 800;
            margin-top: 2px;
        }

        .eta-addr {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .price-box {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.78rem;
            color: var(--text-muted);
            padding: 3px 0;
        }

        .price-row.total {
            border-top: 1.5px solid var(--border);
            margin-top: 5px;
            padding-top: 7px;
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--text);
        }

        .price-row.total span:last-child {
            color: var(--green-dark);
        }

        .price-row .save {
            color: var(--green);
            font-weight: 600;
        }

        .order-actions {
            padding: 12px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            background: #fafafa;
        }

        .order-total-tag {
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .order-total-tag strong {
            color: var(--green-dark);
            font-size: 0.95rem;
        }

        .action-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 7px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary {
            background: var(--green);
            color: white;
        }

        .btn-primary:hover {
            background: var(--green-dark);
        }

        .btn-outline {
            background: white;
            color: var(--text);
            border: 1.5px solid var(--border);
        }

        .btn-outline:hover {
            border-color: var(--green);
            color: var(--green-dark);
        }

        .btn-red {
            background: white;
            color: #dc2626;
            border: 1.5px solid #fecaca;
        }

        .btn-red:hover {
            background: #fef2f2;
        }

        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1a1a2e;
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            z-index: 999;
            transition: transform .3s;
            pointer-events: none;
            white-space: nowrap;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @media(max-width:600px) {
            .header-inner {
                padding: 0 16px;
            }

            .header-search {
                display: none;
            }

            main {
                padding: 20px 14px 40px;
            }

            .order-left {
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
        }

        /* Large tablet */
        @media (max-width:1100px) {
            .card {
                max-width: 800px;
            }

            .left-panel {
                width: 38%;
                padding: 32px 22px;
            }
        }

        /* Tablet */
        @media (max-width:768px) {
            .card {
                max-width: 560px;
                min-height: unset;
            }

            .left-panel {
                width: 34%;
                padding: 28px 16px;
            }

            .left-panel h2 {
                font-size: 1.2rem;
            }

            .lp-features {
                display: none;
            }

            .left-panel p {
                margin-bottom: 0;
                font-size: 12px;
            }

            .tab-btn {
                padding: 10px 6px;
                flex-direction: column;
                font-size: 10px;
            }
        }

        /* Mobile */
        @media (max-width:580px) {
            .header {
                padding: 12px 16px;
            }

            .card {
                border-radius: 18px;
                flex-direction: column;
                max-width: 100%;
                min-height: unset;
            }

            .left-panel {
                width: 100%;
                flex-direction: row;
                padding: 14px 18px;
                border-radius: 0;
                min-height: unset;
            }

            .lp-features {
                display: none;
            }

            .right-panel {
                padding: 22px 18px;
            }

            .social-row {
                flex-direction: column;
            }

            .input-wrap input {
                font-size: 16px;
            }

            html,
            body {
                overflow-x: hidden;
            }
        }

        .rider-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .45);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        .rider-overlay.show {
            display: flex;
        }

        .rider-box {
            background: #fff;
            border-radius: 20px;
            padding: 30px 24px 22px;
            width: 90%;
            max-width: 340px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .2);
            text-align: center;
            animation: rSlide .25s ease;
        }

        @keyframes rSlide {
            from {
                transform: translateY(28px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .rider-ava {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--green-light);
            border: 3px solid var(--green);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            color: var(--green-dark);
            margin: 0 auto 12px;
        }

        .rider-tag {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .8px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .rider-nm {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 16px;
        }

        .rider-call-a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--green-dark);
            color: #fff;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            transition: background .2s;
        }

        .rider-call-a:hover {
            background: #15803d;
        }

        .rider-close {
            display: block;
            width: 100%;
            margin-top: 12px;
            padding: 10px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            background: #fff;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.88rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .rider-close:hover {
            background: var(--bg);
        }

        /* ── Utility classes ── */
        .stat-val-green {
            color: var(--green-dark);
        }

        .stat-val-orange {
            color: var(--orange);
        }

        .stat-val-purple {
            color: #7c3aed;
        }

        .eta-box-delivered {
            background: #f0fdf4;
            border-color: #bbf7d0;
        }

        .eta-label-delivered {
            color: #15803d;
        }

        .eta-box-cancelled {
            background: #fee2e2;
            border-color: #fecaca;
        }

        .eta-label-cancelled {
            color: #dc2626;
        }

        /* ===== RESPONSIVE FIXES ===== */
        @media(max-width:600px) {
            .order-card {
                flex-direction: column;
            }

            .order-left {
                border-right: none;
                border-bottom: 1px solid var(--border);
                padding-bottom: 14px;
            }
        }

        @media(max-width:480px) {
            .header-inner {
                flex-wrap: nowrap;
                padding: 0 12px;
            }

            .logo h1 {
                font-size: 1rem;
            }

            .header-search {
                display: none;
            }

            .order-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
            }

            main {
                padding: 14px 12px 40px;
            }
        }

        @media(max-width:500px) {
            .filter-tabs {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                flex-wrap: nowrap;
                scrollbar-width: none;
                padding-bottom: 4px;
            }

            .filter-tabs::-webkit-scrollbar {
                display: none;
            }

            .filter-tab {
                flex-shrink: 0;
                font-size: 12px;
                padding: 7px 12px;
            }
        }

        @media(max-width:768px) {

            input,
            select,
            textarea {
                font-size: 16px;
            }
        }

        @media(max-width:700px) {
            .footer-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media(max-width:400px) {
            .footer-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ===== END RESPONSIVE FIXES ===== */
    </style>
</head>

<body>


    <div class="rider-overlay" id="riderOverlay" onclick="if(event.target===this)closeRiderModal()">
        <div class="rider-box">
            <div class="rider-ava" id="riderAva">🚴</div>
            <div class="rider-tag">Your Delivery Rider</div>
            <div class="rider-nm" id="riderNm">—</div>
            <a href="#" class="rider-call-a" id="riderCallA">📞 <span id="riderPh">—</span></a>
            <button class="rider-close" onclick="closeRiderModal()">Close</button>
        </div>
    </div>


    <div id="toast"></div>

    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="logo">
                <img src="https://storage.googleapis.com/workspace-0f70711f-8b4e-4d94-86f1-2a93ccde5887/image/6ab4d9fc-53f8-46cf-b443-33dacb111091.png"
                    alt="MediiQuick">
                <h1>Medii<span>Quick</span></h1>
            </a>
            <div class="header-search">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search medicines...">
            </div>
            <div class="header-right">
                <a href="profile.html" class="back-btn"><i class="fas fa-arrow-left"></i> Home</a>
            </div>
        </div>
    </header>

    <main>
        <div class="page-title">My Orders 📦</div>
        <div class="page-sub">Track your medicines — delivered in 30 minutes ⚡</div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon si-green">📦</div>
                <div>
                    <div class="stat-label">Total Orders</div>
                    <div class="stat-val stat-val-green" id="statTotal">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon si-orange">🚴</div>
                <div>
                    <div class="stat-label">Active</div>
                    <div class="stat-val stat-val-orange" id="statActive">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon si-green">✅</div>
                <div>
                    <div class="stat-label">Delivered</div>
                    <div class="stat-val stat-val-green" id="statDelivered">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon si-purple">💊</div>
                <div>
                    <div class="stat-label">Total Spent</div>
                    <div class="stat-val stat-val-purple" id="statSpent">₹0</div>
                </div>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" id="tabAll" onclick="switchTab('all')">All Orders (<span id="cntAll">0</span>)</div>
            <div class="tab" id="tabActive" onclick="switchTab('active')">Active (<span id="cntActive">0</span>)</div>
            <div class="tab" id="tabDelivered" onclick="switchTab('delivered')">Delivered (<span
                    id="cntDelivered">0</span>)</div>
        </div>

        <div id="ordersList"></div>
    </main>



    <script>
        // Auth guard — Firebase Auth based
        (function () {
            import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js").then(({ initializeApp, getApp }) => {
                import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js").then(({ getAuth, onAuthStateChanged }) => {
                    import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js").then(({ getFirestore, doc, getDoc }) => {
                        let _app;
                        try { _app = getApp(); } catch (e) {
                            _app = initializeApp({
                                apiKey: "AIzaSyCMuXqTYFjN1r1DMQZyCRkIWPQ529HUdPo",
                                authDomain: "mediiquick-25a65.firebaseapp.com",
                                projectId: "mediiquick-25a65",
                                storageBucket: "mediiquick-25a65.firebasestorage.app",
                                messagingSenderId: "480632265996",
                                appId: "1:480632265996:web:d58747c0a12e780eddfd29"
                            });
                        }
                        const _auth = getAuth(_app);
                        const _fdb = getFirestore(_app);
                        onAuthStateChanged(_auth, async (user) => {
                            if (!user) { window.location.href = 'login.html'; return; }
                            // Sync Firestore → localStorage for loadOrders() which reads mq_user
                            try {
                                const snap = await getDoc(doc(_fdb, 'users', user.uid));
                                if (snap.exists()) {
                                    // FIX: sessionToken multi-tab logout loop hata diya
                                    // Multi-tab use allowed hai — college demo ke liye zaroori
                                    const merged = { uid: user.uid, email: user.email, ...snap.data(), expiresAt: Date.now() + 86400000 };
                                    localStorage.setItem('mq_user', JSON.stringify(merged));
                                    if (typeof loadOrders === 'function') loadOrders();
                                    if (typeof renderOrders === 'function') renderOrders();
                                }
                            } catch (e) { console.warn('my_order auth sync:', e); }
                        });
                    });
                });
            });
        })();

        const ALL_MEDS = [
            { id: 'm1', name: 'Paracetamol', sub: 'Paracetamol 500mg', price: 40, mrp: 50 },
            { id: 'm2', name: 'Ibuprofen 200', sub: 'Ibuprofen 200mg', price: 64, mrp: 80 },
            { id: 'm3', name: 'Combiflam', sub: 'Ibuprofen+Paracetamol', price: 55, mrp: 70 },
            { id: 'm4', name: 'Nimesulide 100', sub: 'Nimesulide 100mg', price: 22, mrp: 28 },
            { id: 'm5', name: 'Amoxicillin 500', sub: 'Amoxicillin 500mg', price: 96, mrp: 120 },
            { id: 'm6', name: 'Azithromycin 250', sub: 'Azithromycin 250mg', price: 120, mrp: 150 },
            { id: 'm7', name: 'Ciprofloxacin 500', sub: 'Ciprofloxacin 500mg', price: 104, mrp: 130 },
            { id: 'm8', name: 'Doxycycline 100', sub: 'Doxycycline 100mg', price: 48, mrp: 60 },
            { id: 'm9', name: 'Metformin 500', sub: 'Metformin 500mg', price: 72, mrp: 90 },
            { id: 'm10', name: 'Atorvastatin 20', sub: 'Atorvastatin 20mg', price: 88, mrp: 110 },
            { id: 'm11', name: 'Losartan 50', sub: 'Losartan 50mg', price: 80, mrp: 100 },
            { id: 'm12', name: 'Amlodipine 5', sub: 'Amlodipine 5mg', price: 68, mrp: 85 },
            { id: 'm13', name: 'Omeprazole 20', sub: 'Omeprazole 20mg', price: 56, mrp: 70 },
            { id: 'm14', name: 'Levothyroxine 50', sub: 'Levothyroxine 50mcg', price: 128, mrp: 160 },
            { id: 'm15', name: 'Cetirizine 10', sub: 'Cetirizine 10mg', price: 48, mrp: 60 },
            { id: 'm16', name: 'Montelukast 10', sub: 'Montelukast 10mg', price: 112, mrp: 140 },
            { id: 'm17', name: 'Salbutamol Inhaler', sub: 'Salbutamol 100mcg', price: 176, mrp: 220 },
            { id: 'm18', name: 'Prednisone 10', sub: 'Prednisone 10mg', price: 104, mrp: 130 },
            { id: 'm19', name: 'Sertraline 50', sub: 'Sertraline 50mg', price: 144, mrp: 180 },
            { id: 'm20', name: 'Fluoxetine 20', sub: 'Fluoxetine 20mg', price: 136, mrp: 170 },
        ];

        function getMed(id) { return ALL_MEDS.find(m => m.id === id) || {}; }

        const AUTO_FLOW = [
            { status: 'pending', from: 0, to: 2 },
            { status: 'confirmed', from: 2, to: 7 },
            { status: 'packing', from: 7, to: 15 },
            { status: 'on_the_way', from: 15, to: 27 },
            { status: 'delivered', from: 27, to: 999 },
        ];

        function getAutoStatus(order) {
            const min = (Date.now() - order.placedAt) / 60000;
            for (const s of AUTO_FLOW) {
                if (min >= s.from && min < s.to) return s.status;
            }
            return 'delivered';
        }

        function getStatus(order) {
            if (order.status === 'cancelled') return 'cancelled';


            if (order.status === 'pending_acceptance') return 'packing';

            if (['on_the_way', 'delivered', 'packing', 'confirmed'].includes(order.status)) {
                return order.status;
            }

            const autoStatus = getAutoStatus(order);
            const adminStatus = order.status || 'pending';

            const statusOrder = ['pending', 'confirmed', 'packing', 'on_the_way', 'delivered'];
            const autoIdx = statusOrder.indexOf(autoStatus);
            const adminIdx = statusOrder.indexOf(adminStatus);

            return autoIdx > adminIdx ? autoStatus : adminStatus;
        }

        const STATUS_CONFIG = {
            pending: {
                label: 'Pending',
                badge: 'badge-orange', activeStep: 0,
                etaIcon: '⏳', etaLabel: 'Waiting for confirmation',
                etaColor: '#c2410c', etaBg: 'linear-gradient(135deg,#fff7ed,#fffbeb)', etaBorder: '#fed7aa',
                showTimer: true
            },
            confirmed: {
                label: 'Order Confirmed',
                badge: 'badge-orange', activeStep: 1,
                etaIcon: '📋', etaLabel: 'Order confirmed! Finding a rider...',
                etaColor: '#c2410c', etaBg: 'linear-gradient(135deg,#fff7ed,#fffbeb)', etaBorder: '#fed7aa',
                showTimer: true
            },
            pending_acceptance: {
                label: 'Finding Rider 🏍️',
                badge: 'badge-orange', activeStep: 2,
                etaIcon: '🏍️', etaLabel: 'Finding a rider for your order...',
                etaColor: '#7c3aed', etaBg: 'linear-gradient(135deg,#ede9fe,#f5f3ff)', etaBorder: '#c4b5fd',
                showTimer: true
            },
            packing: {
                label: 'Being Packed',
                badge: 'badge-orange', activeStep: 2,
                etaIcon: '📦', etaLabel: 'Packing your medicines',
                etaColor: '#d97706', etaBg: 'linear-gradient(135deg,#fffbeb,#fef9c3)', etaBorder: '#fde68a',
                showTimer: true
            },
            on_the_way: {
                label: 'On the Way 🚴',
                badge: 'badge-green', activeStep: 3,
                etaIcon: '🚴', etaLabel: 'Rider is on the way!',
                etaColor: '#15803d', etaBg: 'linear-gradient(135deg,#dcfce7,#f0fdf4)', etaBorder: '#bbf7d0',
                showTimer: true
            },
            delivered: {
                label: 'Delivered ✓',
                badge: 'badge-check', activeStep: 4,
                showTimer: false
            },
            cancelled: {
                label: 'Cancelled',
                badge: 'badge-red', activeStep: 0,
                etaIcon: '❌', etaLabel: 'This order has been cancelled',
                etaColor: '#dc2626', etaBg: 'linear-gradient(135deg,#fee2e2,#fff1f2)', etaBorder: '#fecaca',
                showTimer: false
            },
        };

        let currentTab = 'all';
        let orders = [];

        function loadOrders() {
            try {
                const raw = localStorage.getItem('mq_user');
                if (!raw) { orders = []; return; }
                const currentUser = JSON.parse(raw);
                const userEmail = (currentUser.email || '').toLowerCase().trim();
                if (!userEmail && !currentUser.uid) { orders = []; return; }

                // FIX: Sirf Firestore cache use karo — localStorage ghost orders remove
                const allOrders = window._mqOrderCache || [];

                orders = allOrders.filter(o => {
                    const orderEmail = (o.customerEmail || o.email || '').toLowerCase().trim();
                    const orderUid = o.userId || o.uid || '';
                    return orderEmail === userEmail || (currentUser.uid && orderUid === currentUser.uid);
                });

                orders.sort((a, b) => (b.placedAt || 0) - (a.placedAt || 0));

            } catch (e) { orders = []; }
        }

        let _currentUserEmail = '';
        try {
            const u = JSON.parse(localStorage.getItem('mq_user') || '{}');
            _currentUserEmail = (u.email || '').toLowerCase().trim();
            if (!u.email && !u.uid) window.location.href = 'login.html';
        } catch (e) { window.location.href = 'login.html'; }


        window.addEventListener('storage', function (e) {
            if (e.key === 'mq_user') {

                try {
                    const u = JSON.parse(e.newValue || '{}');
                    if (!u.email && !u.uid) window.location.href = 'login.html';
                } catch (e) { window.location.href = 'login.html'; }
            }
        });

        function getEtaText(order) {
            const status = getStatus(order);
            if (status === 'cancelled' || status === 'delivered') return '';

            const elapsedMin = (Date.now() - order.placedAt) / 60000;
            const remMin = Math.max(0, 29 - elapsedMin);

            if (remMin <= 0) return 'Arriving any moment!';

            const mins = Math.floor(remMin);
            const secs = Math.floor((remMin - mins) * 60);
            return `${mins} min ${String(secs).padStart(2, '0')} sec`;
        }

        function renderCard(order) {
            const status = getStatus(order);
            const sc = STATUS_CONFIG[status];
            const items = order.items || [];
            const addr = order.deliveryAddr || {};
            const addrStr = addr.street ? `${addr.type || 'Home'}: ${addr.street}, ${addr.city}` : (order.city || 'Your address');
            const total = order.total || 0;

            let mrpTotal = 0;
            items.forEach(({ med, qty }) => { const m = getMed(med.id); mrpTotal += (m.mrp || med.price) * qty; });
            const discount = mrpTotal - total;

            const placedAt = new Date(order.placedAt);
            const now = new Date();
            const isToday = placedAt.toDateString() === now.toDateString();
            const timeStr = isToday
                ? `Today, ${placedAt.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })}`
                : placedAt.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }) + ', ' +
                placedAt.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

            const STEP_DEFS = [
                { icon: '🛒', label: 'Placed' },
                { icon: '📋', label: 'Confirmed' },
                { icon: '📦', label: 'Packing' },
                { icon: '🚴', label: 'On the Way' },
                { icon: '🏠', label: 'Delivered' },
            ];

            const stepsHTML = STEP_DEFS.map((s, i) => {
                const done = i < sc.activeStep;
                const active = i === sc.activeStep;
                return `<div class="t-step ${done ? 'done' : active ? 'active' : ''}">
                    <div class="t-icon">${done ? '✓' : s.icon}</div>
                    <div class="t-label">${s.label}</div>
                </div>`;
            }).join('');

            let etaBoxHTML = '';
            if (status === 'delivered') {
                const deliveredIn = order.statusUpdatedAt && order.placedAt
                    ? Math.round((order.statusUpdatedAt - order.placedAt) / 60000)
                    : Math.round((Date.now() - order.placedAt) / 60000);
                const delivMsg = deliveredIn && deliveredIn < 60
                    ? `Delivered in ${deliveredIn} min ⚡`
                    : 'Delivered successfully!';
                etaBoxHTML = `<div class="eta-box eta-box-delivered">
                    <div class="eta-icon">✅</div>
                    <div>
                        <div class="eta-label eta-label-delivered">DELIVERED SUCCESSFULLY</div>
                        <div class="eta-time eta-label-delivered">${delivMsg}</div>
                    </div>
                </div>`;
            } else if (status === 'cancelled') {
                etaBoxHTML = `<div class="eta-box eta-box-cancelled">
                    <div class="eta-icon">❌</div>
                    <div>
                        <div class="eta-label eta-label-cancelled">ORDER CANCELLED</div>
                        <div class="eta-time eta-label-cancelled">This order has been cancelled</div>
                    </div>
                </div>`;
            } else {
                const etaText = getEtaText(order);
                etaBoxHTML = `<div class="eta-box" style="background:${sc.etaBg};border-color:${sc.etaBorder};">
                    <div class="eta-icon">${sc.etaIcon}</div>
                    <div>
                        <div class="eta-label" style="color:${sc.etaColor};">⏱ ${sc.etaLabel}</div>
                        <div class="eta-time" id="eta-${order.orderId}" style="color:${sc.etaColor};">${etaText}</div>
                        <div class="eta-addr">📍 ${addrStr}</div>
                    </div>
                </div>`;
            }

            const itemsHTML = items.map(({ med, qty }) => {
                const m = getMed(med.id);
                const off = Math.round((1 - (med.price / (m.mrp || med.price * 1.25))) * 100);
                return `<div class="med-item">
                    <div class="med-img">💊<span class="med-off">${off}%</span></div>
                    <div class="med-info">
                        <div class="med-name">${med.name}</div>
                        <div class="med-sub">${m.sub || med.sub || ''}</div>
                    </div>
                    <div class="med-price">
                        <div class="curr">₹${med.price * qty}</div>
                        <div class="orig">₹${(m.mrp || Math.round(med.price * 1.25)) * qty}</div>
                        <div class="qty">Qty: ${qty}</div>
                    </div>
                </div>`;
            }).join('');

            let actionsHTML = '';
            if (status === 'delivered') {
                actionsHTML = `<button class="btn btn-primary" onclick="reorder('${order.orderId}')">🔄 Reorder</button><button class="btn btn-outline">⭐ Rate Order</button>`;
            } else if (status === 'confirmed' || status === 'pending') {
                actionsHTML = `<button class="btn btn-red" onclick="cancelOrder('${order.orderId}')">✕ Cancel Order</button>`;
            } else if (status === 'packing') {
                actionsHTML = `<div style="font-size:12px;color:#1d4ed8;background:#dbeafe;padding:7px 12px;border-radius:8px;font-weight:600;display:inline-block;">📦 Order is being packed...</div>
                <button class="btn btn-red" style="margin-left:8px;" onclick="cancelOrder('${order.orderId}')">✕ Cancel Order</button>`;
            } else if (status === 'on_the_way') {
                actionsHTML = `<button class="btn btn-outline" onclick="showRiderInfo('${order.orderId}')">📞 Call Rider</button>`;
            } else if (status === 'cancelled') {
                actionsHTML = `<button class="btn btn-primary" onclick="reorder('${order.orderId}')">🔄 Reorder</button>`;
            }

            const cardDataStatus = (status === 'delivered' || status === 'cancelled') ? status : 'active';
            return `<div class="order-card" data-status="${cardDataStatus}">
                <div class="order-top">
                    <div class="order-meta">
                        <span class="order-id-tag">${order.orderId}</span>
                        <div class="order-date">Placed: <strong>${timeStr}</strong></div>
                    </div>
                    <span class="badge ${sc.badge}"><span class="badge-dot"></span> ${sc.label}</span>
                </div>
                <div class="order-body">
                    <div class="order-left">
                        <div class="section-label">💊 Medicines Ordered</div>
                        ${itemsHTML}
                    </div>
                    <div class="order-right">
                        <div class="section-label">📍 Order Tracking</div>
                        ${etaBoxHTML}
                        <div class="tracker-steps">${stepsHTML}</div>
                        <div class="section-label">💰 Price Details</div>
                        <div class="price-box">
                            <div class="price-row"><span>MRP Total</span><span>₹${mrpTotal}</span></div>
                            <div class="price-row"><span>Discount</span><span class="save">-₹${Math.max(0, discount)}</span></div>
                            <div class="price-row"><span>Delivery</span><span class="${order.codCharge > 0 ? '' : 'save'}">${order.codCharge > 0 ? '+₹' + order.codCharge + ' (COD)' : 'FREE'}</span></div>
                            <div class="price-row total"><span>Amount Paid</span><span>₹${total}</span></div>
                        </div>
                    </div>
                </div>
                <div class="order-actions">
                    <div class="order-total-tag">Total: <strong>₹${total}</strong> · ${order.payMethod || 'Paid'}</div>
                    <div class="action-btns">${actionsHTML}</div>
                </div>
            </div>`;
        }


        const MQ_DEFAULT_RIDER = { name: 'Ravi Kumar', phone: '9876543210' };

        function showRiderInfo(orderId) {
            const order = orders.find(o => o.orderId === orderId);
            if (!order) return;

            const rider = (order.deliveryBoy && order.deliveryBoy.name)
                ? order.deliveryBoy
                : MQ_DEFAULT_RIDER;

            document.getElementById('riderAva').textContent = rider.name.charAt(0).toUpperCase();
            document.getElementById('riderNm').textContent = rider.name;
            document.getElementById('riderPh').textContent = rider.phone;
            document.getElementById('riderCallA').href = 'tel:' + rider.phone;

            document.getElementById('riderOverlay').classList.add('show');
        }

        function closeRiderModal() {
            document.getElementById('riderOverlay').classList.remove('show');
        }


        function renderAll() {
            loadOrders();

            const active = orders.filter(o => !['delivered', 'cancelled'].includes(getStatus(o)));
            const delivered = orders.filter(o => getStatus(o) === 'delivered');
            const spent = orders.filter(o => getStatus(o) === 'delivered').reduce((s, o) => s + (o.total || 0), 0);

            document.getElementById('statTotal').textContent = orders.length;
            document.getElementById('statActive').textContent = active.length;
            document.getElementById('statDelivered').textContent = delivered.length;
            document.getElementById('statSpent').textContent = '₹' + spent;
            document.getElementById('cntAll').textContent = orders.length;
            document.getElementById('cntActive').textContent = active.length;
            document.getElementById('cntDelivered').textContent = delivered.length;

            let filtered = orders;
            if (currentTab === 'active') filtered = active;
            if (currentTab === 'delivered') filtered = delivered;

            const list = document.getElementById('ordersList');
            if (filtered.length === 0) {
                const msgs = {
                    all: 'No orders yet',
                    active: 'No active orders',
                    delivered: 'No delivered orders'
                };
                const subs = {
                    all: 'Place your first order and get medicines in 29 minutes!',
                    active: 'You have no orders in progress right now.',
                    delivered: 'Your completed orders will appear here.'
                };
                list.innerHTML = `<div class="empty-state">
                    <div class="ei">📋</div>
                    <h3>${msgs[currentTab]}</h3>
                    <p>${subs[currentTab]}</p>
                    <a href="profile.html" class="shop-btn">💊 Order Medicines Now</a>
                </div>`;
                return;
            }

            list.innerHTML = filtered.map(renderCard).join('');
        }

        function switchTab(tab) {
            currentTab = tab;
            ['all', 'active', 'delivered'].forEach(t => {
                const el = document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1));
                if (el) el.classList.toggle('active', t === tab);
            });
            renderAll();
        }

        // ✅ localStorage se order completely remove karo (ghost orders ke liye)
        function _removeOrderFromLocalStorage(orderId) {
            try {
                // Cache se remove
                window._mqOrderCache = (window._mqOrderCache || []).filter(x => x.orderId !== orderId);

                // mq_orders se remove
                let localOrders = JSON.parse(localStorage.getItem('mq_orders') || '[]');
                localStorage.setItem('mq_orders', JSON.stringify(localOrders.filter(x => x.orderId !== orderId)));

                // mq_orders_<email> se remove
                const userEmail = (JSON.parse(localStorage.getItem('mq_user') || '{}').email || '').toLowerCase().trim();
                if (userEmail) {
                    const userKey = 'mq_orders_' + userEmail;
                    let userOrders = JSON.parse(localStorage.getItem(userKey) || '[]');
                    localStorage.setItem(userKey, JSON.stringify(userOrders.filter(x => x.orderId !== orderId)));
                }
            } catch (e) { console.warn('[MQ] localStorage remove failed:', e); }
        }

        async function cancelOrder(orderId) {
            if (!confirm('Are you sure you want to cancel this order?')) return;

            let stored = window._mqOrderCache || [];
            const o = stored.find(x => x.orderId === orderId);

            // Delivered ya on_the_way order cancel nahi ho sakta
            if (o && (o.status === 'on_the_way' || o.status === 'delivered')) {
                showToast('❌ This order cannot be cancelled at this stage.', 'error');
                return;
            }

            try {
                // ✅ Pehle check karo — kya yeh order Firestore mein hai?
                let existsInFirestore = false;
                if (window._mqFirestore) {
                    try {
                        const { doc, getDoc, updateDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
                        const orderRef = doc(window._mqFirestore, 'orders', orderId);
                        const orderSnap = await getDoc(orderRef);

                        if (orderSnap.exists()) {
                            // ✅ Firestore mein hai — properly cancel karo
                            existsInFirestore = true;
                            await updateDoc(orderRef, { status: 'cancelled', cancelledAt: Date.now() });
                            console.log('[MQ] Order cancelled in Firestore:', orderId);
                        } else {
                            // ❌ Ghost order — Firestore mein exist nahi karta
                            // Sirf localStorage se remove karo
                            console.warn('[MQ] Ghost order detected:', orderId, '— removing from localStorage only');
                            _removeOrderFromLocalStorage(orderId);
                            showToast('🗑️ Ghost order removed. It was not saved in database.');
                            loadOrders();
                            renderAll();
                            return;
                        }
                    } catch (fsErr) {
                        console.warn('[MQ] Firestore check failed, falling back to localStorage cancel:', fsErr);
                    }
                }

                // localStorage mein bhi cancel karo (Firestore success ke baad)
                if (o) { o.status = 'cancelled'; o.cancelledAt = Date.now(); }
                window._mqOrderCache = stored;

                try {
                    let localOrders = JSON.parse(localStorage.getItem('mq_orders') || '[]');
                    const lo = localOrders.find(x => x.orderId === orderId);
                    if (lo) { lo.status = 'cancelled'; lo.cancelledAt = Date.now(); }
                    localStorage.setItem('mq_orders', JSON.stringify(localOrders));
                } catch (e) { }

                try {
                    const userEmail = (JSON.parse(localStorage.getItem('mq_user') || '{}').email || '').toLowerCase().trim();
                    if (userEmail) {
                        const userKey = 'mq_orders_' + userEmail;
                        let userOrders = JSON.parse(localStorage.getItem(userKey) || '[]');
                        const uo = userOrders.find(x => x.orderId === orderId);
                        if (uo) { uo.status = 'cancelled'; uo.cancelledAt = Date.now(); }
                        localStorage.setItem(userKey, JSON.stringify(userOrders));
                    }
                } catch (e) { }

                showToast('✓ Order cancelled successfully!');
                loadOrders();
                renderAll();
            } catch (e) {
                showToast('❌ Failed to cancel order. Please try again.', 'error');
                console.error('[MQ] cancelOrder error:', e);
            }
        }

        function reorder(orderId) {
            const order = orders.find(o => o.orderId === orderId);
            if (order && order.items && order.items.length > 0) {

                try {
                    localStorage.setItem('mq_reorder_cart', JSON.stringify(order.items));
                } catch (e) { }
            }
            showToast('🛒 Taking you to medicines...');
            setTimeout(() => window.location.href = 'profile.html', 1200);
        }

        let toastTimer;
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
        }

        renderAll();


        window._mqLoadOrders = loadOrders;
        window._mqRenderAll = renderAll;

        setInterval(() => {
            orders.forEach(order => {
                const status = getStatus(order);
                if (status === 'cancelled' || status === 'delivered') return;
                const el = document.getElementById(`eta-${order.orderId}`);
                if (el) el.textContent = getEtaText(order);
            });
        }, 1000);

        setInterval(() => {
            loadOrders();
            renderAll();
        }, 10000);
    </script>


    <script type="module">
        import { initializeApp, getApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCMuXqTYFjN1r1DMQZyCRkIWPQ529HUdPo",
            authDomain: "mediiquick-25a65.firebaseapp.com",
            projectId: "mediiquick-25a65",
            storageBucket: "mediiquick-25a65.firebasestorage.app",
            messagingSenderId: "480632265996",
            appId: "1:480632265996:web:d58747c0a12e780eddfd29"
        };
        const _app = (() => { try { return getApp(); } catch (e) { return initializeApp(firebaseConfig); } })();
        const _db = getFirestore(_app);
        window._mqFirestore = _db; // Expose for cancelOrder

        function getUserIdentifiers() {
            try {
                const user = JSON.parse(localStorage.getItem('mq_user') || '{}');
                return {
                    email: (user.email || '').toLowerCase().trim(),
                    uid: user.uid || ''
                };
            } catch (e) { return { email: '', uid: '' }; }
        }


        // ✅ Ghost orders purge — localStorage mein jo orders hain but Firestore mein nahi, unhe hata do
        function _purgeGhostOrders(firestoreOrderIds) {
            if (!firestoreOrderIds || firestoreOrderIds.length === 0) return;
            const fsIds = new Set(firestoreOrderIds);

            try {
                // mq_orders purge
                let localOrders = JSON.parse(localStorage.getItem('mq_orders') || '[]');
                const cleanLocal = localOrders.filter(o => {
                    // Agar order 5 minute se purana hai aur Firestore mein nahi → ghost hai
                    const isOld = (Date.now() - (o.placedAt || 0)) > 5 * 60 * 1000;
                    return !isOld || fsIds.has(o.orderId);
                });
                if (cleanLocal.length !== localOrders.length) {
                    localStorage.setItem('mq_orders', JSON.stringify(cleanLocal));
                    console.log('[MQ] Purged', localOrders.length - cleanLocal.length, 'ghost order(s) from mq_orders');
                }

                // mq_orders_<email> purge
                const userEmail = (JSON.parse(localStorage.getItem('mq_user') || '{}').email || '').toLowerCase().trim();
                if (userEmail) {
                    const userKey = 'mq_orders_' + userEmail;
                    let userOrders = JSON.parse(localStorage.getItem(userKey) || '[]');
                    const cleanUser = userOrders.filter(o => {
                        const isOld = (Date.now() - (o.placedAt || 0)) > 5 * 60 * 1000;
                        return !isOld || fsIds.has(o.orderId);
                    });
                    if (cleanUser.length !== userOrders.length) {
                        localStorage.setItem(userKey, JSON.stringify(cleanUser));
                        console.log('[MQ] Purged', userOrders.length - cleanUser.length, 'ghost order(s) from', userKey);
                    }
                }

                // _mqOrderCache purge
                if (window._mqOrderCache) {
                    window._mqOrderCache = window._mqOrderCache.filter(o => {
                        const isOld = (Date.now() - (o.placedAt || 0)) > 5 * 60 * 1000;
                        return !isOld || fsIds.has(o.orderId);
                    });
                }
            } catch (e) { console.warn('[MQ] Ghost purge failed:', e); }
        }

        async function subscribeOrderUpdates() {
            try {
                const { email, uid } = getUserIdentifiers();
                if (!email && !uid) return;


                const q = query(collection(_db, 'orders'), where('customerEmail', '==', email));

                // FIX: Store unsubscribe function to prevent memory leak
                window._mqOrderUnsubscribe = onSnapshot(q, (snap) => {
                    const emailOrders = snap.docs.map(d => ({ id: d.id, ...d.data() }));

                    // ✅ Ghost orders purge — Firestore se confirm hone ke baad
                    const fsOrderIds = emailOrders.map(o => o.orderId).filter(Boolean);

                    if (uid) {
                        const uidQ = query(collection(_db, 'orders'), where('userId', '==', uid));
                        getDocs(uidQ).then(uidSnap => {
                            const uidOrders = uidSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                            const merged = [...emailOrders];
                            uidOrders.forEach(uo => {
                                if (!merged.find(eo => eo.orderId === uo.orderId)) merged.push(uo);
                            });
                            const allFsIds = merged.map(o => o.orderId).filter(Boolean);
                            _purgeGhostOrders(allFsIds); // ✅ Ghost purge
                            window._mqOrderCache = merged;
                            if (window._mqLoadOrders) { window._mqLoadOrders(); window._mqRenderAll(); }
                        }).catch(() => {
                            _purgeGhostOrders(fsOrderIds); // ✅ Ghost purge fallback
                            window._mqOrderCache = emailOrders;
                            if (window._mqLoadOrders) { window._mqLoadOrders(); window._mqRenderAll(); }
                        });
                    } else {
                        _purgeGhostOrders(fsOrderIds); // ✅ Ghost purge
                        window._mqOrderCache = emailOrders;
                        if (window._mqLoadOrders) { window._mqLoadOrders(); window._mqRenderAll(); }
                    }
                }, (err) => {
                    console.warn('Firestore order subscription error:', err);

                    if (window._mqLoadOrders) { window._mqLoadOrders(); window._mqRenderAll(); }
                });

                // FIX: Cleanup listener when user leaves page
                window.addEventListener('beforeunload', () => {
                    if (window._mqOrderUnsubscribe) { window._mqOrderUnsubscribe(); }
                }, { once: true });

            } catch (e) {
                console.warn('Firestore subscription failed:', e);

                if (window._mqLoadOrders) { window._mqLoadOrders(); window._mqRenderAll(); }
            }
        }

        subscribeOrderUpdates();
    </script>
